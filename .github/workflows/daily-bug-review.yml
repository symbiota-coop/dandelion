name: Daily Bug Review

env:
  CLAUDE_MODEL: claude-opus-4-6

on:
  schedule:
    - cron: '0 4 * * 1-5'
  workflow_dispatch:

jobs:
  bug-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Check for recent commits
        id: check-commits
        run: |
          COMMITS=$(git log --since='24 hours ago' --oneline --no-merges)
          if [ -z "$COMMITS" ]; then
            echo "No commits in the past 24 hours"
            echo "has_commits=false" >> $GITHUB_OUTPUT
          else
            echo "Found commits:"
            echo "$COMMITS"
            echo "has_commits=true" >> $GITHUB_OUTPUT
          fi

      - uses: anthropics/claude-code-action@beta
        if: steps.check-commits.outputs.has_commits == 'true'
        with:
          mode: agent
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: ${{ env.CLAUDE_MODEL }}
          override_prompt: |
            You are a deep bug-finding automation for Dandelion, a Ruby/Mongo app built on
            the Padrino framework (Sinatra-based, NOT Rails). The ORM is Mongoid, not ActiveRecord.
            Read AGENTS.md at the repo root for full setup and architecture context.

            ## Goal
            Inspect commits from the past 24 hours and identify critical correctness bugs that
            escaped review. Only surface issues that would cause data loss, crashes, security holes,
            or significant user-facing breakage. Do not review older commits.

            ## Investigation strategy
            - Only review files changed in commits from the past 24 hours.
            - Focus on behavioral changes with meaningful blast radius.
            - Look for: data corruption, race conditions that lose writes, nil dereferences in
              critical paths (note: Mongoid.raise_not_found_error = false so Model.find returns nil
              for invalid ids), auth/permission bypasses, infinite loops, resource leaks, silent
              data truncation, and Mongoid query mistakes (e.g. wrong query operators, missing
              scoping on multi-tenant data).
            - Trace through the full code path — don't just pattern-match on the diff. Understand
              the caller chain and downstream effects. Files in lib/ are auto-loaded by Padrino.
            - Ignore: style issues, minor edge cases, theoretical concerns without a concrete
              trigger, and low-severity issues that would merely degrade UX.

            ## Confidence bar
            - You must be able to describe a concrete scenario that triggers the bug.
            - If you cannot construct a plausible trigger scenario, do not open a PR.
            - When in doubt, do not open a PR.

            ## Fix strategy
            - If you find a critical bug, implement a minimal, high-confidence fix.
            - Add or update tests when possible (run tests with:
              foreman run -e .env.test bundle exec ruby -I test test/$1_test.rb).
            - Avoid broad refactors in the same PR.

            ## Safety rules
            - Do not open a PR unless you are highly confident the bug is real and the fix is correct.
            - If no critical bug is found, do nothing.

            ## Output
            If a PR is opened, the description must include:
            - Bug and impact
            - Root cause
            - Fix and validation performed

            Start by running: git log --since='24 hours ago' --oneline --no-merges
            Then inspect the changed files and trace through the code paths described above.
