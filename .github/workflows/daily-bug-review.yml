name: Daily Bug Review

env:
  CLAUDE_MODEL: claude-opus-4-7
  CURSOR_MODEL: composer-2.5

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  check-commits:
    runs-on: ubuntu-latest
    outputs:
      has_commits: ${{ steps.setup.outputs.has_commits }}
    steps:
      - name: Setup
        id: setup
        uses: ./.github/actions/bug-review-setup

  claude-bug-review:
    needs: check-commits
    if: needs.check-commits.outputs.has_commits == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Load prompt
        id: prompt
        uses: ./.github/actions/bug-review-prompt
        with:
          title_prefix: '[Claude] '

      - uses: anthropics/claude-code-action@v1
        with:
          show_full_output: true
          display_report: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model ${{ env.CLAUDE_MODEL }}
            --dangerously-skip-permissions
          prompt: ${{ steps.prompt.outputs.text }}

  cursor-bug-review:
    needs: check-commits
    if: needs.check-commits.outputs.has_commits == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Load prompt
        id: prompt
        uses: ./.github/actions/bug-review-prompt
        with:
          title_prefix: '[Cursor] '

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Run bug review
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PROMPT_TEXT: ${{ steps.prompt.outputs.text }}
        run: |
          agent -p --trust --model "$CURSOR_MODEL" "$PROMPT_TEXT"
