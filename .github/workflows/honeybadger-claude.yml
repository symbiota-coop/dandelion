name: Auto-Claude for Honeybadger Issues

env:
  CLAUDE_MODEL: claude-opus-4-6

on:
  issues:
    types: [opened]

jobs:
  auto-claude:
    if: contains(github.event.issue.title, '[Dandelion/production]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model ${{ env.CLAUDE_MODEL }}
          trigger_phrase: ""
          prompt: |
            A production error was reported by Honeybadger.
            Read AGENTS.md at the repo root for setup and architecture context.

            ## Error details
            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

            ## Instructions
            - Investigate the error by tracing through the codebase
            - Identify the root cause
            - Provide a fix as a pull request if you're confident in the solution
            - If you're not confident, comment on the issue with your analysis and suggested approach