name: Daily Bug Review (Cursor)

concurrency:
  group: daily-bug-review-cursor
  cancel-in-progress: true

env:
  CURSOR_MODEL: composer-2.5

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  bug-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Setup
        id: setup
        uses: ./.github/actions/bug-review-setup

      - name: Load prompt
        if: steps.setup.outputs.has_commits == 'true'
        id: prompt
        uses: ./.github/actions/bug-review-prompt
        with:
          title_prefix: '[Cursor] '

      - name: Install Cursor CLI
        if: steps.setup.outputs.has_commits == 'true'
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Run bug review
        if: steps.setup.outputs.has_commits == 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PROMPT_TEXT: ${{ steps.prompt.outputs.text }}
        run: |
          agent -p --trust --force --model "$CURSOR_MODEL" \
            --output-format stream-json \
            "$PROMPT_TEXT"
